version: "3.8"

services:
  app:
    build: .
    container_name: job_discovery_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/job_discovery
      - AI_PROVIDER=mock
      - GEMINI_API_KEY=
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=info
    volumes:
      - ./logs:/workspace/logs
      - ./exports:/workspace/exports
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: job_discovery_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=job_discovery
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_discovery"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
