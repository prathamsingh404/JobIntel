# Central Pipeline Configuration

# Collector Settings
collectors:
  active:
    - greenhouse
    - lever
    - ashby
    - linkedin
    - indeed
    - naukri
    - company_site
  batch_size: 50
  rate_limit_delay_seconds: 1.0
  max_retries: 3
  backoff_factor: 2.0

# Cleaning & Preprocessing Settings
cleaner:
  language_filter: ["en"] # Only keep English jobs

# Deduplication Thresholds
deduplication:
  title_similarity_threshold: 0.85
  company_similarity_threshold: 0.90
  description_similarity_threshold: 0.85
  use_semantic_similarity: false # Set to true to use sentence-transformers (requires torch)

# Rule Engine Settings (Weighted Score)
rule_engine:
  min_score_threshold: 10
  positive_keywords:
    python: 5
    pytorch: 10
    tensorflow: 8
    nlp: 10
    llm: 15
    rag: 15
    langchain: 10
    cuda: 12
    computer vision: 10
    machine learning: 10
    deep learning: 10
    mlops: 12
    data science: 8
    statistics: 5
    sql: 3
    aws: 3
    fastapi: 5
    langgraph: 10
    llama: 10
    transformers: 10
    openai: 5
    gemini: 5
  negative_keywords:
    sales: -100
    marketing: -100
    recruiter: -100
    graphic designer: -100
    finance: -20
    content creator: -100
    hr: -100
    operations: -20
    customer support: -100
    trainer: -20
    account manager: -100
    sales executive: -100

